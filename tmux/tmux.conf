# ============================================================================
# tmux.conf — minimal, macOS + Ghostty friendly
# ============================================================================
# Install: brew install tmux
# Load:    tmux source-file ~/.config/tmux/tmux.conf  (or just start tmux)
#
# Most-used keys (prefix = Ctrl+a):
#   prefix c       new window
#   prefix |  or \  split pane right (vertical line)
#   prefix -       split pane down
#   prefix h/j/k/l navigate panes (vim-style)
#   prefix H/J/K/L resize panes (repeat)
#   prefix z       zoom current pane (toggle fullscreen within window)
#   prefix [       enter copy mode (vi keys)
#   prefix d       detach (session keeps running in background)
#   tmux a         attach to the last session
#   prefix r       reload this config
#   Mouse          click + scroll work

# ---- General ----
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,ghostty:RGB"
set -g history-limit 100000
set -g escape-time 10                  # no lag on esc (vim-friendly)
set -g focus-events on
set -g mouse on
setw -g mode-keys vi                   # vi keys in copy mode

# ---- Prefix: Ctrl+a instead of the default Ctrl+b ----
unbind C-b
set -g prefix C-a
bind C-a send-prefix                   # pass Ctrl+a through to the shell if pressed twice

# ---- Reload config ----
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded."

# ---- Windows start at 1 (easier to reach than 0) ----
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on             # keep numbers tight after closing windows

# ---- Splits that remember cwd ----
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ---- Session picker (same fzf picker as Ghostty new-tab) ----
# prefix + S = open session picker in a new window
bind S new-window "~/.local/bin/ghostty-session-picker"

# ---- Vim-style pane navigation ----
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---- Resize panes (repeat with -r) ----
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---- Copy mode: yank to macOS clipboard ----
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ---- Window titles → Ghostty title bar ----
# Propagate tmux window name to Ghostty's title bar / Cmd+` switcher.
# Claude Code sessions set window names via the sync script; plain shells
# use automatic-rename (shows running command).
set -g set-titles on
set -g set-titles-string "#W"
set -g automatic-rename on

# ---- Status bar (hot pink / purple to match sketchybar) ----
set -g status-style "fg=#ffffff,bg=#1a0a24"
set -g status-left-length 60
set -g status-right-length 80
set -g status-interval 5
set -g status-left "#(f=~/.claude/tmux-status-left.txt; [ -s \"$f\" ] && cat \"$f\" || echo '#[fg=#bf00ff,bold] #S') #[fg=#ffffff,default]│ "
set -g status-right "#(f=~/.claude/tmux-status-right.txt; [ -s \"$f\" ] && cat \"$f\" || echo '')#[default] #[fg=#ff1493]%H:%M "
set -g window-status-current-style "fg=#1a0a24,bg=#ff1493,bold"
set -g window-status-current-format " #I:#W "
set -g window-status-format " #I:#W "
set -g pane-border-style "fg=#414550"
set -g pane-active-border-style "fg=#ff1493"
set -g message-style "fg=#1a0a24,bg=#ff1493,bold"

# ---- Session Persistence (tmux-resurrect + tmux-continuum) ----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
# Disabled: was auto-restoring previous pane contents (including Claude Code)
# set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'
