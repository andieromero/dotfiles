# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# after-login-command was deprecated in AeroSpace 0.19.0.
# Auto-launch core apps via macOS Login Items instead:
#   System Settings -> General -> Login Items & Extensions -> Open at Login
# Add: Google Chrome, Ghostty, Windsurf, Slack. Each app's on-window-detected
# rule below routes it to the right workspace when its window appears.

# You can use it to add commands that run after AeroSpace startup.
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = ['exec-and-forget borders active_color=0xffe1e3e4 inactive_color=0xff494d64 width=5.0 >/dev/null 2>&1 & disown']

# Start AeroSpace at login
start-at-login = true 

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 0

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' = wide monitor gets horizontal, tall gets vertical
# Forced vertical: new windows always stack top-to-bottom regardless of monitor shape.
default-root-container-orientation = 'vertical'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = false 


#ADDED STUFF
#
#
#
#
#
# Notify Sketchybar about workspace change and update icons
exec-on-workspace-change = ['/bin/bash', '-c', 'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE && ~/.config/sketchybar/plugins/update_workspace_icons.sh']

# Possible values: (qwerty|dvorak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitfor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See: https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.bottom = 5
outer.top = [
  { monitor."built-in" = 10 },
  { monitor."main" = 50 },
  50
]
outer.left = 5
outer.right = 5

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon, backtick,
#                   leftSquareBracket, rightSquareBracket, space, enter, esc, backspace, tab
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift

# All possible commands: https://nikitabobko.github.io/AeroSpace/commands

# See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
# You can uncomment the following lines to open up terminal with alt + enter shortcut (like in i3)
# alt-enter = '''exec-and-forget osascript -e '
# tell application "Terminal"
#     do script
#     activate
# end tell'
# '''

# App shortcuts
alt-b = 'exec-and-forget open -a "Google Chrome"'        # Browser (workspace 1)
alt-c = 'exec-and-forget open -a "Windsurf"'              # Code editor (workspace 2)
alt-t = 'exec-and-forget open -a "Ghostty"'               # Terminal (workspace 3)
alt-o = 'exec-and-forget open -a "Microsoft Outlook"'     # Email (workspace 4)
alt-s = 'exec-and-forget open -a "Slack"'                 # Chat (workspace 6)
alt-w = 'exec-and-forget open -a "Obsidian"'              # Notes (workspace 9)
alt-p = 'exec-and-forget open -a "Adobe Premiere Pro 2024"'
alt-shift-r = ['exec-and-forget /opt/homebrew/bin/sketchybar --reload']

# See: https://nikitabobko.github.ioeAeroSpace/commands#layout
alt-e = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-f = 'fullscreen'
alt-y = ['focus right', 'join-with down', 'layout tiles horizontal']

# ---- cmd-prefixed layout toggles (consistent with cmd+1..9 workspace flow) ----
cmd-backslash   = 'layout tiles horizontal vertical'      # tiles H <-> V
cmd-slash       = 'layout accordion horizontal vertical'  # accordion H <-> V
cmd-period      = 'layout tiles accordion'                # tiles <-> accordion
cmd-0           = 'fullscreen'                            # fullscreen toggle
cmd-quote       = 'layout floating tiling'                # float <-> tile
cmd-shift-w     = 'close'                                 # close focused window
# See: https://nikitabobko.github.io/AeroSpace/commands#focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Arrow-key focus — cmd + arrow cycles through windows directionally AND
# crosses monitor boundaries so you can sweep across every visible window
# on every attached display. Wraps around when you hit the outer edge.
#
# Note: overrides macOS text-nav defaults (cmd+left = start of line, etc.)
# in text input, use Home/End or option+arrow for word-nav.
cmd-left  = 'focus --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors left'
cmd-down  = 'focus --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors down'
cmd-up    = 'focus --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors up'
cmd-right = 'focus --boundaries all-monitors-outer-frame --boundaries-action wrap-around-all-monitors right'

# app shortcut

# See: https://nikitabobko.github.io/AeroSpace/commands#move
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# Switch to workspace — cmd-1..9 (overrides macOS/app defaults for these combos)
cmd-1 = 'workspace 1'
cmd-2 = 'workspace 2'
cmd-3 = 'workspace 3'
cmd-4 = 'workspace 4'
cmd-5 = 'workspace 5'
cmd-6 = 'workspace 6'
cmd-7 = 'workspace 7'
cmd-8 = 'workspace 8'
cmd-9 = 'workspace 9'

# Move focused window to workspace — hyper+1..9
# (hyper = cmd+alt+ctrl+shift, produced by pressing caps lock via Karabiner).
# caps+N sends the focused window to workspace N in one keystroke.
# cmd+tab stays native for the macOS app switcher.
cmd-alt-ctrl-shift-1 = 'move-node-to-workspace 1'
cmd-alt-ctrl-shift-2 = 'move-node-to-workspace 2'
cmd-alt-ctrl-shift-3 = 'move-node-to-workspace 3'
cmd-alt-ctrl-shift-4 = 'move-node-to-workspace 4'
cmd-alt-ctrl-shift-5 = 'move-node-to-workspace 5'
cmd-alt-ctrl-shift-6 = 'move-node-to-workspace 6'
cmd-alt-ctrl-shift-7 = 'move-node-to-workspace 7'
cmd-alt-ctrl-shift-8 = 'move-node-to-workspace 8'
cmd-alt-ctrl-shift-9 = 'move-node-to-workspace 9'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
alt-tab = 'workspace-back-and-forth'
# See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# See: https://nikitabobko.github.io/AeroSpace/commands#mode
alt-shift-semicolon = 'mode service'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main'] # reset layout
f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
backspace = ['close-all-windows-but-current', 'mode main']

# sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
#s = ['layout sticky tiling', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']


# ---- Auto-assign apps to workspaces ----
# Every new window opens on the CURRENT workspace and tiles with the focused
# container — that's AeroSpace's default behavior when no rule matches. No
# pinned anchors, no catch-all. Use caps+N (hyper) to relocate afterwards.

# Force Ghostty windows to tile on launch (overrides any stale floating state).
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = ['layout tiling']

# ---- Always-float apps (small utility windows that look weird tiled) ----
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.QuickTimePlayerX'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.apple.finder'
if.window-title-regex-substring = 'Info'
run = ['layout floating']

[[on-window-detected]]
if.app-id = 'com.1password.1password'
if.window-title-regex-substring = 'Quick Access'
run = ['layout floating']

# Workspace -> monitor force assignment.
#
# Pinned by monitor NAME (not by 'main'/'secondary') so the layout is
# independent of macOS's main-display setting.
#
#   HP E27 G5  -> active loop (5-8): Ghostty, Windsurf, Chrome, overflow
#   USB C2     -> reference (1-4):   scratch, Slack, free, free
#
# Each pin ends with 'main' as a fallback. When only one display is attached
# (laptop on the go, or only one external connected), every workspace collapses
# to that single display automatically.
[workspace-to-monitor-force-assignment]
1 = ['USB C2', 'main']           # Free / scratch
2 = ['USB C2', 'main']           # Slack
3 = ['USB C2', 'main']           # Free
4 = ['USB C2', 'main']           # Free
5 = ['HP E27 G5', 'main']        # Ghostty
6 = ['HP E27 G5', 'main']        # Windsurf
7 = ['HP E27 G5', 'main']        # Chrome
8 = ['HP E27 G5', 'main']        # Overflow / inbox (unpinned apps)
9 = ['USB C2', 'main']           # Hidden scratch (Obsidian / Messages)
